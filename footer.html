<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

    <!-- Internal CSS for Footer -->
<style>
    footer {
        background-color: #111;
        color: #fff;
        padding: 40px 0;
        font-family: Arial, sans-serif;
    }

    .footer-container {
        max-width: 1200px;
        margin: auto;
        padding: 0 20px;
    }

    .footer-content {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
    }

    .footer-logo img {
        height: 100px;
    }

    .footer-links {
        text-align: center;
        flex: 2;
    }

    .footer-links a {
        margin: 0 10px;
        color: #fff;
        text-decoration: none;
        transition: color 0.3s ease;
    }

    .footer-links a:hover {
        color: #f39c12;
    }

    .social-icons {
        text-align: right;
        flex: 1;
    }

    .social-icons a {
        margin: 0 5px;
        color: #fff;
        font-size: 18px;
        transition: color 0.3s ease;
    }

    .social-icons a:hover {
        color: #f39c12;
    }

    .footer-copy {
        text-align: center;
        margin-top: 30px;
        font-size: 14px;
        color: #bbb;
    }
</style>

<!-- Footer HTML -->
<footer>
    <div class="footer-container">
        <div class="footer-content">
            <!-- Logo -->
            <a href="Index.html" class="footer-logo">
                <img src="Logo.jpeg" alt="Logo">
            </a>

            <!-- Navigation Links -->
            <div class="footer-links">
                <a href="Index.html">Home</a>
                <a href="About.html">About Us</a>
                <a href="Services.html">Services</a>
                <a href="Packages.html">Courses</a>
                <a href="Contact.html">Contact</a>
            </div>

            <!-- Social Icons -->
            <div class="social-icons">
                <a href="https://facebook.com" target="_blank" title="Facebook"><i class="fab fa-facebook-f"></i></a>
                <a href="https://instagram.com" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://twitter.com" target="_blank" title="Twitter"><i class="fab fa-twitter"></i></a>
                <a href="https://youtube.com" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
            </div>
        </div>

        <!-- Copyright -->
        <p class="footer-copy">© 2025 Riddhi Motor Training School. Created by Kirtan Patel.</p>
    </div>
</footer>

    
</body>
</html>
